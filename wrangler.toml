# ─── GreenBroker — Cloudflare Workers configuration ──────────────────────────
# Deployment: npm run deploy:cf
# Local preview: npm run preview:cf
# Docs:
# - https://developers.cloudflare.com/workers/framework-guides/web-apps/nextjs/
# - https://opennext.js.org/cloudflare/get-started

"$schema" = "./node_modules/wrangler/config-schema.json"

name = "greenbroker"
main = ".open-next/worker.js"

# Must be 2024-09-23 or later for @opennextjs/cloudflare.
compatibility_date = "2026-04-09"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[vars]
# Commercial FDD backend deployed separately from the Worker app.
# Public Railway URL is non-sensitive; the shared secret is set via:
#   wrangler secret put ENTROPY_AUTH_SHARED_SECRET --name greenbroker
ENTROPY_API_INTERNAL_URL = "https://api-production-544f.up.railway.app"

# Add dashboard env vars/secrets instead of committing them here:
# - NEXT_PUBLIC_APP_URL
# - NEXT_PUBLIC_SUPABASE_URL
# - NEXT_PUBLIC_SUPABASE_ANON_KEY
# - SUPABASE_SERVICE_ROLE_KEY
# - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
# - STRIPE_SECRET_KEY
# - RESEND_API_KEY
# - EMAIL_FROM
# - UPLOADTHING_TOKEN

[observability]
enabled = true
